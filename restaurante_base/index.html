<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Il Sapore</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="#"><h1>Il Sapore</h1></a>
      </div>
    </nav>
  </header>

  <main class="container my-5">
    <section class="seccion-contenido mb-5">
      <h2 class="titulo-seccion">Menú del Restaurante</h2>

      <div class="botones-filtro mb-4">
        <button class="btn btn-outline-dark boton-filtro activo" onclick="filtrarCategoria('Todos', this)">Todos</button>
        <button class="btn btn-outline-dark boton-filtro" onclick="filtrarCategoria('Entradas', this)">Entradas</button>
        <button class="btn btn-outline-dark boton-filtro" onclick="filtrarCategoria('Platos Fuertes', this)">Platos Fuertes</button>
        <button class="btn btn-outline-dark boton-filtro" onclick="filtrarCategoria('Postres', this)">Postres</button>
      </div>

      <div id="Contenedor-tarjetas"></div>
    </section>

    <section class="seccion-contenido">
      <h2 class="titulo-seccion">Formulario de Reservas</h2>

      <form id="formReserva" novalidate>
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre completo</label>
          <input type="text" id="nombre" class="form-control" />
          <div id="errorNombre" class="error-campo"></div>
        </div>

        <div class="mb-3">
          <label for="correo" class="form-label">Correo electrónico</label>
          <input type="email" id="correo" class="form-control" />
          <div id="errorCorreo" class="error-campo"></div>
        </div>

        <div class="mb-3">
          <label for="fecha" class="form-label">Fecha de reserva</label>
          <input type="date" id="fecha" class="form-control" />
          <div id="errorFecha" class="error-campo"></div>
        </div>

        <div class="mb-3">
          <label for="hora" class="form-label">Hora</label>
          <select id="hora" class="form-select">
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="18:00">18:00</option>
            <option value="19:00">19:00</option>
            <option value="20:00">20:00</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="personas" class="form-label">Número de personas</label>
          <input type="number" id="personas" class="form-control" min="1" max="20" />
          <div id="errorPersonas" class="error-campo"></div>
        </div>

        <div class="mb-3">
          <label for="comentarios" class="form-label">Comentarios</label>
          <textarea id="comentarios" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" id="btnEnviar" class="btn btn-reserva" disabled>
          Enviar reserva
        </button>
      </form>

      <div class="table-responsive mt-4">
        <table class="table table-bordered table-hover align-middle">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Personas</th>
            </tr>
          </thead>
          <tbody id="tablaReservas"></tbody>
        </table>
      </div>

      <div id="resumenReservas" class="resumen-reservas"></div>
    </section>
  </main>

  <script src="js/app.js"></script>

  <footer>
    <p>&copy; 2026 Il Sapore | Todos los derechos reservados</p>
  </footer>
</body>
</html>
